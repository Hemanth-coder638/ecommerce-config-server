server:
  port: 0   # random port for services
zipkin:
  tracing:
    endpoint: http://localhost:9411/api/v2/spans

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

management:
    tracing:
      sampling:
        probability: 1.0   # trace ALL requests (dev mode)
    endpoints:
      web:
       exposure:
         include: "*"

logging:
  level:
    root: INFO
